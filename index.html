<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Senai</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <!--Abertura de formulário-->
    <form>
        <h2>Inscrição SENAI</h2>
        <!--Dados pessoais-->
        <fieldset>
            <legend>Dados Pessoais</legend>
            <!--Nome-->
            <label for="nome">Nome completo:</label> <br>
            <input type="text" name="nome" id="nome" placeholder="Insira seu nome" required> <br><br>

            <!--Data de Nascimento-->
            <label for="idade">Data de nascimento:</label><br>
            <input type="date" name="idade" id="idade" required> <br><br>

            <!--CPF-->
            <label for="CPF">CPF:</label><br>
            <input type="text" name="CPF" id="CPF" minlength="11" maxlength="11" required><br><br>

            <!--RG-->
            <label for="RG">RG:</label><br>
            <input type="text" name="RG" id="RG" minlength="9" maxlength="9"><br><br>

            <!--Gênero (radio)-->
            <p>Gênero:</p><br>
            <!--M-->
            <input type="radio" id="m" name="genero" value="Masculino" required>
            <label for="m">Masculino</label><br>
            <!--F-->
            <input type="radio" id="f" name="genero" value="Feminino">
            <label for="f">Feminino</label><br>
            <!--Outro-->
            <input type="radio" id="outro" name="genero" value="Outro">
            <label for="outro">Outro</label><br><br>

            <!--Nacionalidade-->
            <label for="nacionalidade">Nacionalidade:</label><br>
            <input type="text" id="nacionalidade" name="nacionalidade" placeholder="Lugar de nascença" required><br><br>

            <!--Naturalidade-->
            <label for="naturalidade">Naturalidade:</label>
            <input type="text" id="naturalidade" name="naturalidade" placeholder="Lugar de moradia extendida"><br><br>

        </fieldset>
        
        <!--Endereço-->
        <fieldset>
            <legend>Endereço</legend>

            <!--UF-->
             <!--select-->
            
             <!--CEP-->
            <label for="CEP">CEP:</label>
            <input type="number" id="CEP" name="CEP" placeholder="000.000.000-00" required>
            
            <!--Completo(cidade,bairro,rua,numero)-->
            <label for="Endereço completo:"></label>

            <!--Complemento-->

        </fieldset>
        
    
        <!--Fechamento de formulário-->
    </form>
</body>
</html>
