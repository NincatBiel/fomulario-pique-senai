<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Senai</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <!--Abertura de formulário-->
    <form>
        <h2>Inscrição SENAI</h2>
        <!--Dados pessoais-->
        <fieldset>
            <legend>Dados Pessoais</legend><br>
            <!--Nome-->
            <label for="nome">Nome completo:</label> <br>
            <input type="text" name="nome" id="nome" placeholder="Insira seu nome" required> <br><br>

            <!--Data de Nascimento-->
            <label for="idade">Data de nascimento:</label><br>
            <input type="date" name="idade" id="idade" required> <br><br>

            <!--CPF-->
            <label for="CPF">CPF:</label><br>
            <input type="text" name="CPF" id="CPF" minlength="11" maxlength="11" required placeholder="000.000.000-00"><br><br>

            <!--RG-->
            <label for="RG">RG:</label><br>
            <input type="text" name="RG" id="RG" minlength="8" maxlength="8" placeholder="00.000.000"><br>

            <!--Gênero (radio)-->
            <p>Gênero:</p>
            <!--M-->
            <input type="radio" id="m" name="genero" value="Masculino" required>
            <label for="m">Masculino</label><br>
            <!--F-->
            <input type="radio" id="f" name="genero" value="Feminino">
            <label for="f">Feminino</label><br>
            <!--Outro-->
            <input type="radio" id="outro" name="genero" value="Outro">
            <label for="outro">Outro</label><br><br>

            <!--Nacionalidade-->
            <label for="nacionalidade">Nacionalidade:</label><br>
            <input type="text" id="nacionalidade" name="nacionalidade" placeholder="País de nascença" required><br><br>

            <!--Naturalidade-->
            <label for="naturalidade">Naturalidade:</label><br>
            <input type="text" id="naturalidade" name="naturalidade" placeholder="Cidade de nascença"><br><br>

        </fieldset>
        <!--Endereço-->
        <fieldset>
            <legend>Endereço</legend><br>

            <!--UF-->
            <label for="estado">Estado</label>
            <select name="estado" id="estado">
                <option value="AC">Acre</option>
                <option value="AL">Alagoas</option>
                <option value="AP">Amapá</option>
                <option value="AM">Amazonas</option>
                <option value="BA">Bahia</option>
                <option value="CE">Ceará</option>
                <option value="DF">Distrito Federal</option>
                <option value="ES">Espírito Santo</option>
                <option value="GO">Goiás</option>
                <option value="MA">Maranhão</option>
                <option value="MT">Mato Grosso</option>
                <option value="MS">Mato Grosso do Sul</option>
                <option value="MG">Minas Gerais</option>
                <option value="PA">Pará</option>
                <option value="PB">Paraíba</option>
                <option value="PR">Paraná</option>
                <option value="PE">Pernambuco</option>
                <option value="PI">Piauí</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="RO">Rondônia</option>
                <option value="RR">Roraima</option>
                <option value="SC">Santa Catarina</option>
                <option value="SP">São Paulo</option>
                <option value="SE">Sergipe</option>
                <option value="TO">Tocantins</option>
            </select> <br> <br>
            
             <!--CEP-->
            <label for="CEP">CEP:</label><br>
            <input type="number" id="CEP" name="CEP" placeholder="000.000.000-00" required><br><br>
            
            <!--Completo(cidade,bairro,rua,numero)-->
            <label for="endcompleto:">Endereço completo:</label><br>
            <input type="text" id="endcompleto" name="endcompleto" placeholder="Cidade, Bairro, Rua, Número, Complemento" required><br>
        </fieldset>
        <!--Contato-->
        <fieldset>
            <legend>Formas de contato</legend>

            <!--Telefone-->
            <label for="telefone">Telefone:</label>
            <input type="number" id="telefone" name="telefone" placeholder="(00)90000-0000" required><br><br>
            
            <!--E-mail-->
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" required><br><br>
            
            <!--Linkedin-->
            <label for="linkedin">Linkedin:</label>
            <input type="text" id="linkedin" name="linkedin" required><br>

        </fieldset>
        <!--Outras infos-->
        <fieldset style="border-style: solid; border-color: rgba(0, 0, 0, 0.200);">
            <legend>Outras informações (opcional)</legend>
    
            <!--CNH-->
            <p>Possui CNH?</p>
            <input type="radio" id="s" name="cnh" value="Sim">
            <label for="s">Sim</label> <br>

            <input type="radio" id="n" name="cnh" value="Nao">
            <label for="n">Não</label> <br>

            <!--CNH type-->
            <p>Se sim, qual(is) o(s) tipo(s)?</p>
            <input type="checkbox" name="cnhtype" id="A" value="A">
            <label for="A">A</label>
            <input type="checkbox" name="cnhtype" id="B" value="B">
            <label for="B">B</label>
            <input type="checkbox" name="cnhtype" id="C" value="C">
            <label for="C">C</label>
            <input type="checkbox" name="cnhtype" id="D" value="D">
            <label for="D">D</label>
            <input type="checkbox" name="cnhtype" id="E" value="E">
            <label for="E">E</label> <br><br>
            
            <!--Blood type-->
            <label for="bloodtype">Tipo sanguíneo:</label>
            <select name="bloodtype" id="bloodtype">
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
        
        </fieldset>
        <br>
        <!--Fechamento de formulário-->
    <div class="botao">
        <button type="submit" class="enviar">Cadastrar-se</button>
        <button type="reset" class="limpar">Limpar</button>
    </div>

    </form>
    <br>
    <button onclick="window.location.href='index2.html'" class="login">Já sou aluno!</button>
</body>
</html>
